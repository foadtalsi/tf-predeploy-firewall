name: "TF Pre-Deploy Firewall"
description: "Scans changed Terraform files in a PR for AI-hallucination and risk patterns before terraform apply."
author: "foadtalsi"

inputs:
  base-ref:
    description: "Git ref to diff against (the PR base branch)."
    required: false
    default: ${{ github.event.pull_request.base.ref }}
  block-threshold:
    description: "Minimum severity (low|medium|high|critical) that fails the check. Overrides config/default.yml."
    required: false
    default: ""
  github-token:
    description: "Token used to post the PR comment. Defaults to the workflow's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  sarif-output:
    description: "Path to write a SARIF 2.1.0 file for upload to GitHub Code Scanning. Leave empty to skip."
    required: false
    default: ""
  plan-json:
    description: >
      Phase 2 (optional): path to the output of `terraform show -json <planfile>`,
      run earlier in your own job with your own cloud credentials. This action never
      runs terraform or touches the cloud itself — it only reads this file, if given,
      to add confirmed-replace, unexpected-drift, and large-blast-radius findings on
      top of the static .tf scan. Leave empty to run phase 1 only.
    required: false
    default: ""
  plan-blast-radius-threshold:
    description: "Number of destroy/replace actions in the plan that triggers a large-blast-radius finding. Overrides config/default.yml. Only used with plan-json."
    required: false
    default: ""

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - "--base-ref"
    - "origin/${{ inputs.base-ref }}"
    - "--sarif-output"
    - "${{ inputs.sarif-output }}"
    - "--plan-json"
    - "${{ inputs.plan-json }}"
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    SCANNER_BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
    SCANNER_PLAN_BLAST_RADIUS_THRESHOLD: ${{ inputs.plan-blast-radius-threshold }}

branding:
  icon: "shield"
  color: "red"
